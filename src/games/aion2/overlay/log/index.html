<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DPS Log</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="log-titlebar">
      <span class="log-titlebar__title" data-tauri-drag-region>DPS Log</span>
      <label class="log-titlebar__debug" title="Enable debug logs">
        <input type="checkbox" id="debug-toggle" />
        <span>Debug</span>
      </label>
      <button class="log-titlebar__clear" id="clear-btn" title="Clear">&empty;</button>
      <button class="log-titlebar__close" id="close-btn" title="Close">&times;</button>
    </div>
    <div class="log-search">
      <input type="text" id="search-input" placeholder="Filter..." class="log-search__input" />
    </div>
    <div class="log-content" id="log-content">
      <div class="log-empty">Waiting for log events...</div>
    </div>
    <div class="log-footer" id="log-footer">
      <span class="log-footer__item">Device: <span class="log-footer__val" id="footer-device">--</span></span>
      <span class="log-footer__item">Port: <span class="log-footer__val" id="footer-port">--</span></span>
      <span class="log-footer__sizes" id="footer-sizes"></span>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
